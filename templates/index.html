<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel to VPR Converter</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Excel to VPR Converter</h1>
        
        <div class="upload-section">
            <div id="upload-container">
                <div class="upload-row" id="row-1">
                    <span class="day-label">Day 1</span>
                    <input type="file" name="file-1" onchange="validateFile(1)">
                    <span class="status" id="status-1"></span>
                    <div class="controls">
                        <button class="btn-plus" onclick="addRow(this)">+</button>
                    </div>
                </div>
            </div>

            <button class="btn-extract" onclick="extractVPR()">Excel - VPR 추출</button>
        </div>

        <div id="manual-input-section">
            <h2>수동 기입 및 최종 확인</h2>
            <div id="manual-form">
                <div class="input-group">
                    <label>2-4) 평가 장소/노면:</label>
                    <input type="text" id="m-location" placeholder="남양연구소 고속주회로">
                </div>
                <div class="input-group">
                    <label>3-2) 로드노이즈 Comment:</label>
                    <textarea id="m-roadnoise" rows="3"></textarea>
                </div>
                <div class="input-group">
                    <label>3-3) 패턴노이즈 Comment:</label>
                    <textarea id="m-patternnoise" rows="3"></textarea>
                </div>
                <button class="save-btn" onclick="saveFinal()">최종 HTML 파일로 변환 (저장)</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel to VPR Converter</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">엑셀 파일을 분석 중입니다... 잠시만 기다려주세요.</div>
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div id="progress-percent">0%</div>
    </div>
    
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #3498db; margin-bottom: 20px;">
            <h1>Excel to VPR Converter</h1>
            <button onclick="toggleReportList()" style="background: #2c3e50; color: white; padding: 10px;">저장된 리포트 목록</button>
        </div>
        
        <div id="report-list-section" style="display: none; margin-bottom: 30px; background: #fdfdfd; padding: 20px; border: 1px solid #ddd;">
            <h3>저장된 리포트 목록</h3>
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="background: #eee;">
                        <th style="padding: 10px; border: 1px solid #ccc;">의뢰번호</th>
                        <th style="padding: 10px; border: 1px solid #ccc;">Project</th>
                        <th style="padding: 10px; border: 1px solid #ccc;">작성일</th>
                        <th style="padding: 10px; border: 1px solid #ccc;">작업</th>
                    </tr>
                </thead>
                <tbody id="report-table-body">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>

        <div id="upload-section-main">
            <div class="upload-section">
            <div id="upload-container">
                <div class="upload-row" id="row-1">
                    <span class="day-label">Day 1</span>
                    <input type="file" name="file-1" onchange="validateFile(1)">
                    <span class="status" id="status-1"></span>
                    <div class="controls">
                        <button class="btn-plus" onclick="addRow(this)">+</button>
                    </div>
                </div>
            </div>

            <button class="btn-extract" onclick="extractVPR()">Excel - VPR 추출</button>
        </div>
        </div> <!-- End of upload-section-main -->

        <div id="manual-input-section">
            <h2>보고서 초안 생성</h2>
            <div class="report-edit-wrapper">
                <div class="paper-container" id="paper-container">
                    <div id="manual-form">
                        <!-- Dynamic content loaded here -->
                    </div>
                </div>
                <div id="floating-controls-placeholder"></div>
            </div>
            <button class="save-btn" onclick="saveFinal()">최종 HTML 파일로 변환 (저장)</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
